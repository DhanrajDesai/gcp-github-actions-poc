name: Test GCP Authentication


on:
  push:
    branches:
      - main


permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1033224611649/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-sa@gcp-zero-to-hero-499506.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify
        run: gcloud auth list
